version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build:client
  artifacts:
    baseDirectory: dist/client
    files:
      - '**/*'
  customHeaders:
    - pattern: '/assets/**'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
  cache:
    paths:
      - node_modules/**/*
customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>'
    target: /index.html
    status: '200'
