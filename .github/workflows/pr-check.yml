name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chuanmen
          POSTGRES_PASSWORD: chuanmen
          POSTGRES_DB: chuanmen_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd server && npm ci && npx prisma generate

      - name: Frontend type check
        run: npx tsc --noEmit

      - name: Backend type check
        run: cd server && npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: API tests
        env:
          DATABASE_URL: postgresql://chuanmen:chuanmen@localhost:5432/chuanmen_test
          APP_ENV: local
        run: cd server && npm test
