version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chuanmen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chuanmen
      POSTGRES_PASSWORD: chuanmen
      POSTGRES_DB: chuanmen_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: chuanmen-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc:latest
    container_name: chuanmen-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb -p local/chuanmen-media-dev || true;
      mc cors set local/chuanmen-media-dev /tmp/cors.json;
      echo 'minio init done';
      "
    volumes:
      - ./system-test/minio-cors.json:/tmp/cors.json:ro

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chuanmen-server
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
      - minio-setup
    environment:
      APP_ENV: local
      NODE_ENV: development
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost:4000
      TRUST_PROXY: 'false'
      DATABASE_URL: postgresql://chuanmen:chuanmen@postgres:5432/chuanmen_dev?schema=public
      AWS_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: chuanmen-media-dev
      AWS_S3_ENDPOINT: http://host.docker.internal:9000
      AWS_S3_FORCE_PATH_STYLE: 'true'
      AWS_S3_PUBLIC_BASE_URL: http://localhost:9000/chuanmen-media-dev
      S3_PRESIGN_EXPIRES_SECONDS: 900
      AWS_SES_FROM_EMAIL: noreply@chuanmen.local
    ports:
      - '4000:4000'

volumes:
  postgres_data:
  minio_data:
