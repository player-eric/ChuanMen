# Local development: Postgres + MinIO (no server container — run with `npm run dev`)

services:
  postgres:
    image: postgres:16-alpine
    container_name: chuanmen-pg-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: chuanmen
      POSTGRES_PASSWORD: chuanmen
      POSTGRES_DB: chuanmen_dev
    ports:
      - '5432:5432'
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chuanmen -d chuanmen_dev']
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: chuanmen-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_dev_data:/data

  minio-setup:
    image: amazon/aws-cli:latest
    container_name: chuanmen-minio-setup-dev
    depends_on:
      - minio
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      until curl -sf http://minio:9000/minio/health/ready; do sleep 2; done;
      aws --endpoint-url http://minio:9000 s3 mb s3://chuanmen-media-dev 2>/dev/null || true;
      aws --endpoint-url http://minio:9000 s3api put-bucket-policy --bucket chuanmen-media-dev --policy file:///tmp/policy.json;
      echo 'MinIO bucket ready (public-read policy applied)';
      "
    volumes:
      - ./system-test/minio-bucket-policy.json:/tmp/policy.json:ro

volumes:
  pg_dev_data:
  minio_dev_data:
